<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="color-scheme" content="dark">
  <meta name="darkreader-lock">
  <title>commonplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #03180c;
      color: #D4D8DD;
      font-family: "Inter", system-ui, sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 120px;
      height: 100vh;
      padding: 30px 0 30px 15px;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .sidebar h1 {
      font-family: "Playfair Display", serif;
      font-size: 1rem;
      font-weight: 700;
      color: #eef0ed;
      margin-bottom: 15px;
      white-space: nowrap;
    }

    .sidebar h1 a {
      color: inherit;
      text-decoration: none;
    }

    .sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar nav a {
      color: #8FAF9B;
      text-decoration: none;
      font-size: 0.82rem;
      transition: color 0.15s ease;
    }

    .sidebar nav a:hover {
      text-decoration: underline;
    }

    .sidebar nav a.active::after {
      content: " ->";
      color: #8FAF9B;
    }

    .canvas {
      margin-left: 140px;
      padding: 70px 70px 120px 60px;
      columns: 3;
      column-gap: 120px;
    }

    .art-item {
      break-inside: avoid;
      margin-bottom: 80px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
      transition: border-color 0.2s ease, opacity 0.2s ease;
      opacity: 0.88;
    }

    .art-item:hover {
      border-color: rgba(255, 255, 255, 0.22);
      opacity: 1;
    }

    .art-item img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <h1><a href="../index.html">Tejashri Maske</a></h1>
    <nav>
      <a href="writings.html">Writings</a>
      <a href="readings.html">Readings</a>
      <a href="art.html" class="active">Art</a>
    </nav>
  </aside>

  <div class="canvas">
    <div class="art-item"><img src="art/sunflower.jpeg" alt="artwork" /></div>
    <div class="art-item"><img src="art/Cbookmark.jpeg" alt="artwork" /></div>
    <div class="art-item"><img src="art/gwen.jpeg" alt="artwork" /></div>
    <div class="art-item"><img src="art/cars.jpeg" alt="artwork" /></div>
    <div class="art-item"><img src="art/Cpouch.jpeg" alt="artwork" /></div>
    <div class="art-item"><img src="art/rainyday.jpeg" alt="artwork" /></div>
    <div class="art-item"><img src="art/cat.jpeg" alt="artwork" /> </div>
    <div class="art-item"><img src="art/candle.jpeg" alt="artwork" /></div>
    <div class="art-item"><img src="art/tulips.jpeg" alt="artwork" /></div>
    <div class="art-item"><img src="art/Cheadband.jpeg" alt="artwork" /></div>
    <div class="art-item"><img src="art/nightplace.jpeg" alt="artwork" /></div>
    <div class="art-item"><img src="art/HPslytherin.jpeg" alt="artwork" /></div>
    <div class="art-item"><img src="art/spiderman.jpeg" alt="artwork" /></div>
    <div class="art-item"><img src="art/Cbouquet.jpeg" alt="artwork" /></div>


  </div>
</body>

</html>
